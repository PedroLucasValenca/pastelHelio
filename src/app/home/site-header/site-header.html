<header class="site-header" aria-label="Navegação principal">
  <button
    class="icon-button"
    type="button"
    aria-label="Abrir menu"
    aria-controls="mobile-menu"
    [attr.aria-expanded]="isMobileMenuOpen()"
    [class.is-open]="isMobileMenuOpen()"
    (click)="toggleMobileMenu()"
  >
    <svg lucideMenu aria-hidden="true"></svg>
  </button>

  <a class="brand" routerLink="/inicio" aria-label="Pastel do Hélio - início" (click)="closeMobileMenu()">
    <img ngSrc="/pastel-do-helio-logo-branco.png?v=2" width="96" height="61" alt="" class="brand-logo" />
    <span class="brand-name">Pastel do Hélio</span>
  </a>

  <nav class="main-nav" aria-label="Seções do site">
    <a routerLink="/inicio" routerLinkActive="is-active" ariaCurrentWhenActive="page">Início</a>
    <a routerLink="/cardapio" routerLinkActive="is-active" ariaCurrentWhenActive="page">Cardápio</a>
    <a routerLink="/locais" routerLinkActive="is-active" ariaCurrentWhenActive="page">Locais</a>
    <a routerLink="/eventos" routerLinkActive="is-active" ariaCurrentWhenActive="page">Eventos</a>
    <a routerLink="/inicio" fragment="historia">História</a>
  </nav>

  <a
    class="cart-link"
    routerLink="/cardapio"
    routerLinkActive="is-active"
    [attr.aria-label]="hasCartItems() ? 'Ver carrinho com ' + cartItemsCount() + ' itens' : 'Ver carrinho'"
    (click)="closeMobileMenu()"
  >
    <svg lucideShoppingCart aria-hidden="true"></svg>
    @if (hasCartItems()) {
      <span class="cart-badge" aria-hidden="true">{{ cartItemsCount() }}</span>
    }
  </a>

  <nav id="mobile-menu" class="mobile-nav" [class.is-open]="isMobileMenuOpen()" aria-label="Menu mobile">
    <a routerLink="/inicio" routerLinkActive="is-active" ariaCurrentWhenActive="page" (click)="closeMobileMenu()">Início</a>
    <a routerLink="/cardapio" routerLinkActive="is-active" ariaCurrentWhenActive="page" (click)="closeMobileMenu()">Cardápio</a>
    <a routerLink="/locais" routerLinkActive="is-active" ariaCurrentWhenActive="page" (click)="closeMobileMenu()">Locais</a>
    <a routerLink="/eventos" routerLinkActive="is-active" ariaCurrentWhenActive="page" (click)="closeMobileMenu()">Eventos</a>
    <a routerLink="/inicio" fragment="historia" (click)="closeMobileMenu()">História</a>
  </nav>
</header>
